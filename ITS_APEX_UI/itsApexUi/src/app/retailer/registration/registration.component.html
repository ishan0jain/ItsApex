<form class="registration-form" [formGroup]="retailerForm">
  <div class="grid grid-2">
    <div class="input">
      <label>Shop name</label>
      <input formControlName="shopName" placeholder="Shop name">
    </div>
    <div class="input">
      <label>Shop type</label>
      <select formControlName="shopType">
        <option *ngFor="let type of shopTypes" [value]="type">{{ type }}</option>
      </select>
    </div>
    <div class="input">
      <label>Tags</label>
      <input formControlName="tags" placeholder="organic, seasonal, handmade">
    </div>
    <div class="input">
      <label>Radius (km)</label>
      <input type="number" formControlName="radius" placeholder="Service radius">
    </div>
    <div class="input">
      <label>Retailer first name</label>
      <input formControlName="retailerFirstName" placeholder="First name">
    </div>
    <div class="input">
      <label>Retailer last name</label>
      <input formControlName="retailerLastName" placeholder="Last name">
    </div>
    <div class="input">
      <label>Contact phone</label>
      <input formControlName="contactPhone" placeholder="Phone number">
    </div>
    <div class="input">
      <label>Landmark</label>
      <input formControlName="landmark" placeholder="Nearest landmark">
    </div>
  </div>

  <div class="input">
    <label>Shop description</label>
    <textarea formControlName="description" placeholder="Describe what you sell"></textarea>
  </div>

  <div class="grid grid-2">
    <div class="input">
      <label>Address</label>
      <input formControlName="address" placeholder="Street address">
    </div>
    <div class="input">
      <label>City</label>
      <input formControlName="city" placeholder="City">
    </div>
    <div class="input">
      <label>State</label>
      <input formControlName="state" placeholder="State">
    </div>
    <div class="input">
      <label>Pin code</label>
      <input formControlName="pinCode" placeholder="Postal code">
    </div>
  </div>

  <div class="grid grid-2">
    <div class="input">
      <label>Latitude</label>
      <input formControlName="latitude" placeholder="Latitude">
    </div>
    <div class="input">
      <label>Longitude</label>
      <input formControlName="longitude" placeholder="Longitude">
    </div>
  </div>

  <div class="dynamic-section" *ngIf="dynamicFields.length > 0">
    <h4>Regulatory details</h4>
    <div class="grid grid-2">
      <div class="input" *ngFor="let field of dynamicFields">
        <label>{{ field.label }}</label>
        <input *ngIf="field.fieldType === 'text' || field.fieldType === 'email' || field.fieldType === 'date' || field.fieldType === 'number'" [type]="field.fieldType" [formControlName]="field.fieldKey">
        <textarea *ngIf="field.fieldType === 'textarea'" [formControlName]="field.fieldKey"></textarea>
        <select *ngIf="field.fieldType === 'select'" [formControlName]="field.fieldKey">
          <option *ngFor="let option of field.options?.split(',') || []" [value]="option">{{ option }}</option>
        </select>
      </div>
    </div>
  </div>

  <app-shop-image-upload (filesSelected)="onFilesSelected($event)"></app-shop-image-upload>

  <div class="actions">
    <button class="cta" type="button" (click)="submit()">Submit registration</button>
  </div>
  <p class="status" *ngIf="message">{{ message }}</p>
</form>
