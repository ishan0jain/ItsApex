<header class="site-header">
  <div class="brand" routerLink="/">
    <span class="brand-mark">Its</span>
    <span class="brand-mark accent">Apex</span>
  </div>
  <nav class="site-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Overview</a>
    <a routerLink="/consumer" routerLinkActive="active">Buy</a>
    <a routerLink="/retailer" routerLinkActive="active">Retailer</a>
    <a routerLink="/delivery" routerLinkActive="active">Delivery</a>
  </nav>
  <div class="header-actions">
    <div class="user-chip" *ngIf="globalService.userDetails">
      <span class="badge">Signed in</span>
      <span>{{ globalService.userDetails?.firstNm || globalService.userDetails?.usrNm }}</span>
    </div>
    <a class="ghost" routerLink="/login" *ngIf="!globalService.userDetails">Sign in</a>
    <button class="cta" type="button" *ngIf="globalService.userDetails" (click)="logout()">Logout</button>
  </div>
</header>
