<div class="fancy-card-container">
  <mat-card class="fancy-item-card">
    <div class="slider-container">
      <button mat-icon-button class="slider-btn left" (click)="prevImage()" *ngIf="images.length > 1">
        &#8592;
      </button>
      <img mat-card-image [src]="currentImage || 'assets/OIF.jpg'" alt="Item image" class="slider-image">
      <button mat-icon-button class="slider-btn right" (click)="nextImage()" *ngIf="images.length > 1">
        &#8594;
      </button>
    </div>
    <mat-card-header>
      <mat-card-title>{{ name }}</mat-card-title>
      <mat-card-subtitle>Sold by: {{ shop }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="item-rating">
        <ng-container *ngFor="let star of [1,2,3,4,5]; let i = index">
          <span class="star" [class.filled]="i < rating">&#9733;</span>
        </ng-container>
        <span class="rating-value">({{ rating }})</span>
      </div>
      <p class="item-desc">{{ description }}</p>
      <div class="item-price">₹{{ price | number:'1.2-2' }}</div>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-stroked-button color="primary">Add To Cart</button>
      <button mat-flat-button color="accent">Buy</button>
    </mat-card-actions>
  </mat-card>
</div>
