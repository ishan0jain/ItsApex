<div  class="registration-page">
<app-login-page *ngIf="!showRegistrationDialog" (registerClick)="openRegistrationDialog()"></app-login-page>

<div *ngIf="showRegistrationDialog"  class="registration-dialog">
    <button class="close-btn" (click)="closeRegistrationDialog()">&times;</button>
    <h2>Register</h2>
    <form [formGroup]="registrationForm" (ngSubmit)="onRegister()">
        <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" formControlName="name" />
            <div class="error" *ngIf="name?.touched && name?.invalid">Name is required.</div>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" formControlName="email" />
            <div class="error" *ngIf="email?.touched && email?.invalid">
                <span *ngIf="email?.errors?.['required']">Email is required.</span>
                <span *ngIf="email?.errors?.['email']">Invalid email address.</span>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" formControlName="password" />
            <div class="error" *ngIf="password?.touched && password?.invalid">
                <span *ngIf="password?.errors?.['required']">Password is required.</span>
                <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
            </div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" formControlName="confirmPassword" />
            <div class="error" *ngIf="confirmPassword?.touched && confirmPassword?.invalid">Confirm password is
                required.</div>
            <div class="error"
                *ngIf="password?.value && confirmPassword?.value && password?.value !== confirmPassword?.value">
                Passwords do not match.</div>
        </div>
        <button type="submit"
            [disabled]="registrationForm.invalid || password?.value !== confirmPassword?.value">Register</button>
    </form>
</div>
</div>
